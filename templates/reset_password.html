<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/6b8e23/tractor.png">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/LoginRegister.css') }}" />
</head>
<body>

    <div class="page-switcher">
        <a href="{{ url_for('login') }}">
            <button class="switch-btn">Switch to Login</button>
        </a>
    </div>

    <div class="container">
        <div class="form-container">
            <h2 class="form-title">Reset Password</h2>

            <form method="POST" class="form" novalidate autocomplete="off">
                {{ form.hidden_tag() }}

                <div class="form-group">
                    <label for="password">New Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        required
                    />
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    Reset Password
                </button>

                <div class="form-footer">
                    <span style="color: rgba(255, 255, 255, 0.8); font-size: 10px;">
                        Back to <a href="{{ url_for('login') }}">Login</a>
                    </span>
                </div>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
        </div>
    </div>

    <script>
        const btn = document.getElementById("submit-btn");
        const form = document.querySelector("form");

        form.addEventListener("submit", () => {
            btn.disabled = true;
            btn.textContent = "Resetting...";
            btn.style.opacity = "0.7";
        });

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.01;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.01;
            const formContainer = document.querySelector('.form-container');
            formContainer.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
        });
    </script>

</body>
</html>
